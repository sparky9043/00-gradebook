{% extends 'gradebook_main/base.html' %}

{% block content %}

<ul>

        {% comment %} <a href=> {% endcomment %}
        {{ course.date_added|date:"Y" }} {{ course.title }}
      {% comment %} </a> {% endcomment %}

  {% endfor %}
</ul>

{% endblock content %}
